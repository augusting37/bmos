<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Person Display - Tabagwe</title>
<style>
body {
    font-family: Arial, sans-serif;
    background-color: #eef2f7;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
}

.person-card {
    background-color: #ffffff;
    padding: 20px;
    border-radius: 15px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.2);
    text-align: center;
    width: 250px;
}

.person-card img {
    width: 200px;
    border-radius: 10px;
    margin-bottom: 15px;
}

.person-card h3 {
    margin: 5px 0;
    color: #2c3e50;
}

.person-card p {
    margin: 5px 0;
    color: #555;
    font-size: 14px;
}
</style>
</head>
<body>

<div class="person-card">
    <img src="https://images.pexels.com/photos/428340/pexels-photo-428340.jpeg" alt="Person in Jeans Shirt and Shoes">
    <h3>John Doe</h3>
    <p>Casual Outfit: Jeans & Shirt</p>
    <p>Shoes: White Sneakers</p>
</div>

</body>
</html>

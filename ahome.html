<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Gourmet Bistro | Restaurant Management System</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
        }

        body {
            background: #f7f3e9;
            color: #2c2b28;
            padding: 20px;
        }

        /* dashboard layout */
        .dashboard {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            flex-wrap: wrap;
            margin-bottom: 28px;
            border-bottom: 3px solid #d4af7a;
            padding-bottom: 16px;
        }

        h1 {
            font-size: 2.2rem;
            letter-spacing: -0.5px;
            color: #5e3a1c;
        }

        .badge {
            background: #5e3a1c;
            color: #f9e0b0;
            padding: 8px 15px;
            border-radius: 40px;
            font-weight: bold;
            font-size: 0.9rem;
        }

        /* two column grid */
        .main-grid {
            display: grid;
            grid-template-columns: 1fr 380px;
            gap: 28px;
        }

        /* menu section */
        .menu-section {
            background: white;
            border-radius: 32px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            padding: 20px 24px;
        }

        .section-title {
            font-size: 1.7rem;
            font-weight: 600;
            border-left: 6px solid #d4af7a;
            padding-left: 16px;
            margin-bottom: 24px;
            color: #3e2a1f;
        }

        .menu-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 20px;
        }

        .menu-card {
            background: #fffdf9;
            border-radius: 24px;
            border: 1px solid #eee5d8;
            padding: 16px;
            transition: all 0.2s ease;
            box-shadow: 0 2px 6px rgba(0,0,0,0.03);
        }

        .menu-card:hover {
            transform: translateY(-4px);
            border-color: #d4af7a;
            box-shadow: 0 12px 22px rgba(0,0,0,0.08);
        }

        .menu-name {
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 6px;
        }

        .menu-desc {
            font-size: 0.8rem;
            color: #6b5a48;
            margin: 8px 0;
            line-height: 1.3;
        }

        .menu-price {
            font-weight: 800;
            font-size: 1.25rem;
            color: #b5642c;
            margin: 10px 0;
        }

        .add-btn {
            background: #2c5f2d;
            color: white;
            border: none;
            width: 100%;
            padding: 10px;
            border-radius: 40px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .add-btn:hover {
            background: #1f4520;
            transform: scale(0.97);
        }

        /* right panel (cart + reservation) */
        .order-panel {
            display: flex;
            flex-direction: column;
            gap: 28px;
        }

        .cart-card, .reserve-card {
            background: white;
            border-radius: 32px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            padding: 20px;
        }

        .cart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            border-bottom: 1px dashed #e2d4c2;
            padding-bottom: 10px;
        }

        .cart-items {
            max-height: 320px;
            overflow-y: auto;
            margin-bottom: 16px;
        }

        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid #f0e5d8;
        }

        .item-info {
            flex: 2;
        }

        .item-name {
            font-weight: 600;
        }

        .item-qty {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 6px;
        }

        .qty-btn {
            background: #ede3d4;
            border: none;
            width: 26px;
            height: 26px;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            font-size: 1rem;
        }

        .item-price {
            font-weight: 700;
            min-width: 70px;
            text-align: right;
        }

        .cart-total {
            font-size: 1.3rem;
            font-weight: 800;
            text-align: right;
            border-top: 2px solid #d4af7a;
            padding-top: 14px;
            margin-top: 8px;
        }

        .clear-btn {
            background: #a15e3a;
            color: white;
            border: none;
            width: 100%;
            padding: 10px;
            border-radius: 40px;
            margin-top: 12px;
            cursor: pointer;
            font-weight: bold;
        }

        .place-order-btn {
            background: #d4af7a;
            color: #2c2b28;
            border: none;
            width: 100%;
            padding: 12px;
            border-radius: 40px;
            font-weight: bold;
            font-size: 1rem;
            margin-top: 12px;
            cursor: pointer;
            transition: 0.2s;
        }

        .place-order-btn:hover {
            background: #c29a5b;
        }

        /* reservation form */
        .reserve-card h3 {
            margin-bottom: 16px;
            font-size: 1.4rem;
        }

        .res-form input, .res-form select {
            width: 100%;
            padding: 12px;
            margin-bottom: 14px;
            border: 1px solid #ddd0bd;
            border-radius: 60px;
            background: #fffcf7;
            font-size: 0.9rem;
        }

        .reserve-btn {
            background: #5e3a1c;
            color: white;
            width: 100%;
            padding: 12px;
            border-radius: 40px;
            border: none;
            font-weight: bold;
            cursor: pointer;
        }

        .reserve-list {
            margin-top: 16px;
            font-size: 0.8rem;
            background: #faf5ea;
            padding: 12px;
            border-radius: 20px;
        }

        .reserve-list p {
            font-weight: bold;
            margin-bottom: 6px;
        }

        ul#reservationsList {
            list-style: none;
            max-height: 110px;
            overflow-y: auto;
        }

        ul#reservationsList li {
            padding: 4px 0;
            border-bottom: 1px dotted #e0cfba;
            font-size: 0.75rem;
        }

        .toast-msg {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #1f2e1b;
            color: #f9e7c2;
            padding: 12px 24px;
            border-radius: 60px;
            font-weight: 500;
            z-index: 999;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
            transition: 0.2s;
            opacity: 0;
            pointer-events: none;
        }

        @media (max-width: 850px) {
            .main-grid {
                grid-template-columns: 1fr;
            }
            body {
                padding: 12px;
            }
        }

        button {
            cursor: pointer;
        }
        .empty-cart {
            text-align: center;
            color: #a59179;
            padding: 24px 0;
        }
    </style>
</head>
<body>

<div class="dashboard">
    <div class="header">
        <h1>🍽️ Gourmet Bistro · RMS</h1>
        <div class="badge">✨ live orders & reservations</div>
    </div>

    <div class="main-grid">
        <!-- LEFT: MENU SECTION -->
        <div class="menu-section">
            <div class="section-title">🥘 Signature menu</div>
            <div class="menu-grid" id="menuContainer"></div>
        </div>

        <!-- RIGHT: CART + RESERVATION SYSTEM -->
        <div class="order-panel">
            <!-- CART / ORDER MANAGEMENT -->
            <div class="cart-card">
                <div class="cart-header">
                    <h3>🛒 Current order</h3>
                    <span id="itemCountBadge" style="background:#f0e0cd; padding:4px 12px; border-radius:30px;">0 items</span>
                </div>
                <div id="cartItemsList" class="cart-items">
                    <div class="empty-cart">Your cart is empty. Add delicious items!</div>
                </div>
                <div class="cart-total" id="cartTotal">Total: $0.00</div>
                <button class="clear-btn" id="clearCartBtn">🗑️ Clear cart</button>
                <button class="place-order-btn" id="placeOrderBtn">✅ Place order →</button>
            </div>

            <!-- RESERVATION SYSTEM -->
            <div class="reserve-card">
                <h3>📅 Table reservation</h3>
                <div class="res-form">
                    <input type="text" id="resName" placeholder="Your name" autocomplete="off">
                    <input type="number" id="resGuests" placeholder="Number of guests" min="1" max="20" value="2">
                    <input type="datetime-local" id="resTime">
                    <button class="reserve-btn" id="makeReservationBtn">📞 Reserve table</button>
                </div>
                <div class="reserve-list">
                    <p>🗓️ Active reservations</p>
                    <ul id="reservationsList">
                        <li style="color:#b68b5a;">No reservations yet</li>
                    </ul>
                </div>
            </div>
        </div>
    </div>
</div>
<div id="toastMsg" class="toast-msg">✨ Action completed</div>

<script>
    // ---------- MENU DATABASE ----------
    const MENU = [
        { id: 1, name: "Truffle Risotto", desc: "Creamy arborio rice, wild mushrooms, parmesan", price: 18.99, category: "main" },
        { id: 2, name: "Grilled Lamb Chops", desc: "Rosemary garlic, red wine jus, mash", price: 29.50, category: "main" },
        { id: 3, name: "Burrata Salad", desc: "Heirloom tomatoes, basil, balsamic glaze", price: 14.25, category: "starter" },
        { id: 4, name: "Lobster Bisque", desc: "Sherry cream, croutons, chive oil", price: 12.00, category: "soup" },
        { id: 5, name: "Wild Mushroom Pizza", desc: "Truffle oil, mozzarella, arugula", price: 16.80, category: "pizza" },
        { id: 6, name: "Molten Chocolate Cake", desc: "Vanilla gelato, raspberry coulis", price: 9.40, category: "dessert" },
        { id: 7, name: "Espresso Martini", desc: "Vodka, fresh espresso, coffee liqueur", price: 12.50, category: "beverage" },
        { id: 8, name: "Seafood Paella", desc: "Shrimp, mussels, saffron rice", price: 27.90, category: "main" }
    ];

    // ---------- STATE ----------
    let cart = [];          // each item { id, name, price, quantity }
    let reservations = [];  // each: { name, guests, datetime, id }

    // Helper load from localStorage
    function loadData() {
        const storedCart = localStorage.getItem("restaurant_cart");
        if(storedCart) {
            try {
                cart = JSON.parse(storedCart);
            } catch(e) { cart = []; }
        }
        const storedRes = localStorage.getItem("restaurant_reservations");
        if(storedRes) {
            try {
                reservations = JSON.parse(storedRes);
            } catch(e) { reservations = []; }
        }
    }

    function saveCart() {
        localStorage.setItem("restaurant_cart", JSON.stringify(cart));
    }

    function saveReservations() {
        localStorage.setItem("restaurant_reservations", JSON.stringify(reservations));
    }

    // ---------- CART LOGIC ----------
    function addToCart(menuItem) {
        const existingIndex = cart.findIndex(item => item.id === menuItem.id);
        if(existingIndex !== -1) {
            cart[existingIndex].quantity += 1;
        } else {
            cart.push({
                id: menuItem.id,
                name: menuItem.name,
                price: menuItem.price,
                quantity: 1
            });
        }
        saveCart();
        renderCart();
        showToast(`➕ ${menuItem.name} added`);
    }

    function updateQuantity(cartId, delta) {
        const index = cart.findIndex(item => item.id === cartId);
        if(index === -1) return;
        const newQty = cart[index].quantity + delta;
        if(newQty <= 0) {
            cart.splice(index, 1);
        } else {
            cart[index].quantity = newQty;
        }
        saveCart();
        renderCart();
    }

    function clearCart() {
        if(cart.length === 0) {
            showToast("Cart already empty");
            return;
        }
        cart = [];
        saveCart();
        renderCart();
        showToast("🧹 Cart cleared");
    }

    function placeOrder() {
        if(cart.length === 0) {
            showToast("❌ No items in cart to order!");
            return;
        }
        // Simulate order submission
        const total = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
        const orderSummary = cart.map(item => `${item.name} x${item.quantity}`).join(", ");
        alert(`✅ ORDER PLACED!\n\nItems: ${orderSummary}\nTotal: $${total.toFixed(2)}\n\nYour meal will be prepared shortly. Thank you!`);
        // optional: clear cart after order
        cart = [];
        saveCart();
        renderCart();
        showToast("🎉 Order sent to kitchen!");
    }

    // ---------- RENDER CART UI ----------
    function renderCart() {
        const cartContainer = document.getElementById("cartItemsList");
        const totalSpan = document.getElementById("cartTotal");
        const itemBadge = document.getElementById("itemCountBadge");

        if(!cartContainer) return;

        if(cart.length === 0) {
            cartContainer.innerHTML = `<div class="empty-cart">🍽️ Your cart is empty. Add delicious items!</div>`;
            totalSpan.innerText = `Total: $0.00`;
            itemBadge.innerText = `0 items`;
            return;
        }

        let cartHtml = ``;
        let total = 0;
        let totalItems = 0;
        cart.forEach(item => {
            const itemTotal = item.price * item.quantity;
            total += itemTotal;
            totalItems += item.quantity;
            cartHtml += `
                <div class="cart-item">
                    <div class="item-info">
                        <div class="item-name">${escapeHtml(item.name)}</div>
                        <div class="item-qty">
                            <button class="qty-btn" data-id="${item.id}" data-delta="-1">−</button>
                            <span>${item.quantity}</span>
                            <button class="qty-btn" data-id="${item.id}" data-delta="1">+</button>
                        </div>
                    </div>
                    <div class="item-price">$${(itemTotal).toFixed(2)}</div>
                </div>
            `;
        });

        cartContainer.innerHTML = cartHtml;
        totalSpan.innerText = `Total: $${total.toFixed(2)}`;
        itemBadge.innerText = `${totalItems} item${totalItems !== 1 ? 's' : ''}`;

        // attach event listeners for qty buttons
        document.querySelectorAll('.qty-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                const id = parseInt(btn.getAttribute('data-id'));
                const delta = parseInt(btn.getAttribute('data-delta'));
                updateQuantity(id, delta);
            });
        });
    }

    // ---------- RENDER MENU ----------
    function renderMenu() {
        const menuContainer = document.getElementById("menuContainer");
        if(!menuContainer) return;
        menuContainer.innerHTML = "";
        MENU.forEach(item => {
            const card = document.createElement("div");
            card.className = "menu-card";
            card.innerHTML = `
                <div class="menu-name">${escapeHtml(item.name)}</div>
                <div class="menu-desc">${escapeHtml(item.desc)}</div>
                <div class="menu-price">$${item.price.toFixed(2)}</div>
                <button class="add-btn" data-id="${item.id}">➕ Add to order</button>
            `;
            menuContainer.appendChild(card);
        });

        // attach add events
        document.querySelectorAll('.add-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const id = parseInt(btn.getAttribute('data-id'));
                const menuItem = MENU.find(m => m.id === id);
                if(menuItem) addToCart(menuItem);
            });
        });
    }

    // ---------- RESERVATION SYSTEM ----------
    function addReservation(name, guests, datetime) {
        if(!name.trim()) {
            showToast("Please enter your name");
            return false;
        }
        if(guests < 1 || guests > 20) {
            showToast("Guests must be between 1 and 20");
            return false;
        }
        if(!datetime) {
            showToast("Please select date & time");
            return false;
        }
        const selectedTime = new Date(datetime);
        const now = new Date();
        if(selectedTime <= now) {
            showToast("Reservation time must be in the future");
            return false;
        }
        const newRes = {
            id: Date.now(),
            name: name.trim(),
            guests: parseInt(guests),
            datetime: datetime,
            formattedTime: new Date(datetime).toLocaleString()
        };
        reservations.push(newRes);
        saveReservations();
        renderReservations();
        showToast(`Table reserved for ${name} at ${newRes.formattedTime}`);
        return true;
    }

    function renderReservations() {
        const resListEl = document.getElementById("reservationsList");
        if(!resListEl) return;
        if(reservations.length === 0) {
            resListEl.innerHTML = `<li style="color:#b68b5a;">✨ No reservations yet</li>`;
            return;
        }
        // sort by datetime ascending
        const sorted = [...reservations].sort((a,b) => new Date(a.datetime) - new Date(b.datetime));
        resListEl.innerHTML = "";
        sorted.forEach(res => {
            const li = document.createElement("li");
            li.style.fontSize = "0.8rem";
            li.style.padding = "6px 0";
            li.style.borderBottom = "1px solid #f0e0ce";
            const timeStr = new Date(res.datetime).toLocaleString([], {month:'short', day:'numeric', hour:'2-digit', minute:'2-digit'});
            li.innerHTML = `<strong>${escapeHtml(res.name)}</strong> · ${res.guests} guests · ${timeStr}`;
            resListEl.appendChild(li);
        });
    }

    // clear reservation form fields
    function setupReservationForm() {
        const reserveBtn = document.getElementById("makeReservationBtn");
        const resNameInput = document.getElementById("resName");
        const resGuestsInput = document.getElementById("resGuests");
        const resTimeInput = document.getElementById("resTime");

        // set default datetime to tomorrow 7pm
        const tomorrow = new Date();
        tomorrow.setDate(tomorrow.getDate() + 1);
        tomorrow.setHours(19, 0, 0, 0);
        const isoString = tomorrow.toISOString().slice(0, 16);
        if(resTimeInput) resTimeInput.value = isoString;

        if(reserveBtn) {
            reserveBtn.addEventListener("click", () => {
                const name = resNameInput.value;
                const guests = resGuestsInput.value;
                const datetime = resTimeInput.value;
                addReservation(name, guests, datetime);
                // optionally clear name after reservation but keep optional
                resNameInput.value = "";
            });
        }
    }

    // ---------- HELPER FUNCTIONS ----------
    function escapeHtml(str) {
        if(!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if(m === '&') return '&amp;';
            if(m === '<') return '&lt;';
            if(m === '>') return '&gt;';
            return m;
        }).replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]/g, function(c) {
            return c;
        });
    }

    let toastTimeout;
    function showToast(message) {
        const toast = document.getElementById("toastMsg");
        if(!toast) return;
        clearTimeout(toastTimeout);
        toast.innerText = message;
        toast.style.opacity = "1";
        toast.style.pointerEvents = "none";
        toastTimeout = setTimeout(() => {
            toast.style.opacity = "0";
        }, 2300);
    }

    // attach clear cart & place order buttons
    function bindGlobalButtons() {
        const clearBtn = document.getElementById("clearCartBtn");
        if(clearBtn) clearBtn.addEventListener("click", clearCart);
        const placeBtn = document.getElementById("placeOrderBtn");
        if(placeBtn) placeBtn.addEventListener("click", placeOrder);
    }

    // initial load & auto refresh
    function init() {
        loadData();
        renderMenu();
        renderCart();
        renderReservations();
        setupReservationForm();
        bindGlobalButtons();
        // if there is any future re-render needed, we call from actions
    }

    init();
</script>
</body>
</html>
